services:
  application:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - .:/app
    depends_on:
      - database
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_DATABASE: postgres
      DB_USERNAME: postgres
    command: ["make", "test-coverage", "analyse", "lint"]

  database:
    image: postgres:alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
